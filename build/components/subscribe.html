<div class="subscribe">
  <div class="container subscribe__container">
    <h2 class="subscribe__head">Подпишитесь на рассылку</h2>

    <div class="subscribe__form">
    <form class="subscribe-form" action="data/subscribe.json">
      <div class="subscribe-form__field">
        <input class="subscribe-form__input" type="text" name="name" placeholder="Ваше имя" data-required="true" autocomplete="off">
      </div>
      <div class="subscribe-form__field">
        <input class="feedback-form__input" type="text" name="email" placeholder="Электронная почта" data-required="true" autocomplete="off">
      </div>
      <div class="subscribe-form__bottom">
        <button class="button subscribe-form__submit" type="submit">Отправить</button>
        <div class="subscribe-form__policy">
          Отправляя данную форму, вы соглашаетесь с <a href="policy">условиями обработки персональных данных</a>
        </div>
      </div>
    </form>
    </div>
  </div>
</div>
